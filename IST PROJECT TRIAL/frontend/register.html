<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | Debate Club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-light">
  <div class="container">
    <div class="row justify-content-center mt-5">
      <div class="col-md-6 bg-white p-4 rounded shadow">
        <h3 class="text-center mb-3">Create Account</h3>
        <form action="../register.php" method="POST" onsubmit="return validateRegister()">
          <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control" id="regName" required>
          </div>
          <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" id="regEmail" required>
          </div>
          <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" id="regPassword" required>
          </div>
          <button type="submit" class="btn btn-success w-100">Register</button>
        </form>
        <p class="text-center mt-3">Already a member? <a href="login.html">Login</a></p>
      </div>
    </div>
  </div>
  <script src="../assets/js/validate.js"></script>
</body>
</html>
