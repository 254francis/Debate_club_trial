<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Debate Club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-light">
  <div class="container">
    <div class="row justify-content-center mt-5">
      <div class="col-md-5 bg-white p-4 rounded shadow">
        <h3 class="text-center mb-3">Debate Club Login</h3>
        <form action="../login.php" method="POST" onsubmit="return validateLogin()">
          <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" id="loginEmail" required>
          </div>
          <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" id="loginPassword" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <p class="text-center mt-3">Don't have an account? <a href="register.html">Register</a></p>
      </div>
    </div>
  </div>
  <script src="../assets/js/validate.js"></script>
</body>
</html>
